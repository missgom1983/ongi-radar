# =====================================================================
# OnVi Radar 설정 — 코드 수정 없이 여기만 바꾸면 됩니다.
# =====================================================================

# 점수 임계값: 이 점수 미만 항목은 다이제스트에서 제외 (노이즈 컷)
score_threshold: 60

# Claude 모델 (비용↓: claude-haiku-4-5-20251001 / 품질↑: claude-sonnet-4-6)
model: "claude-sonnet-4-6"

# 수집 기간 (최근 N일 이내 항목만)
lookback_days: 7

# ---------------------------------------------------------------------
# 경쟁사 워치리스트
# ---------------------------------------------------------------------
competitors:
  direct:        ["효돌", "와플랫", "스토리워스", "StoryWorth", "Remento", "레멘토"]
  adjacent:      ["케어링", "엄마의 인터뷰", "레페토AI", "레페토"]

# 카테고리 키워드 (뉴스/입찰 공통 검색어)
category_keywords:
  - "AI 돌봄"
  - "시니어 케어"
  - "안부 전화"
  - "노인 말벗"
  - "회상치료"
  - "기억 보존"
  - "펫로스"
  - "고령자 외로움"

# B2G 입찰 감시 키워드 (나라장터) — 와플랫/효돌 지자체 확산 추적
g2b_keywords:
  - "AI 돌봄"
  - "노인 안부"
  - "스마트 경로당"
  - "독거노인"

# ---------------------------------------------------------------------
# 논문 트랙 — 온비 모듈별 영문 검색어 (학술 DB는 영문 색인이 풍부)
# ---------------------------------------------------------------------
paper_topics:
  - { tag: "외로움개입",   query: "loneliness intervention older adults" }
  - { tag: "회상치료",     query: "reminiscence therapy life review elderly" }
  - { tag: "컴패니언AI",   query: "companion robot conversational agent elderly care" }
  - { tag: "펫로스",       query: "pet loss grief bereavement older adults" }
  - { tag: "고인복원윤리", query: "AI deceased digital afterlife grief ethics" }

# ---------------------------------------------------------------------
# 🔍 소스 확장 — 투자·채용 신호(뉴스로 안전 수집) + 특허(KIPRIS)
# ---------------------------------------------------------------------
signal_keywords:           # 뉴스 트랙에 합쳐 검색 (스크래핑 대신 합법적으로)
  - "효돌 투자"
  - "와플랫 투자"
  - "시니어케어 투자 유치"
  - "효돌 채용"
  - "와플랫 채용"

patent_applicants:         # KIPRIS 특허 출원인 모니터링 (KIPRIS_KEY 있을 때만)
  - "효돌"
  - "엔에이치엔"

# 💰 정부 지원사업·공고 필터 키워드 (기업마당, BIZINFO_KEY 있을 때만)
grant_keywords:
  - "시니어"
  - "고령"
  - "돌봄"
  - "헬스케어"
  - "디지털"
  - "AI"
  - "구독"
  - "창업"
  - "투자"
  - "스케일업"
  - "글로벌"

# ---------------------------------------------------------------------
# 🧠✍️🎯 스마트 모듈 — 켜고 끄기
# ---------------------------------------------------------------------
smart:
  memory: true     # 신규/지속 태깅 + 경쟁사 추세(가속) 감지
  editor: true     # 주간 한 줄 판단 + 할 일 1개
  pitch:  true     # 피치덱 경쟁분석 슬라이드 초안 자동 생성

# ---------------------------------------------------------------------
# 전달 채널 — 켜고 끄기
# ---------------------------------------------------------------------
delivery:
  notion: true     # Notion DB에 누적 저장
  email:  true     # 주간 HTML 다이제스트 발송
